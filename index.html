<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="color-scheme" content="light dark">
<title>Nsika — Local Vendor Directory</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/desktop.css">
</head>
<body>

<div id="app">
  <div id="toast" class="toast">Action successful</div>

  <!-- Screens -->
  <div id="screen-home" class="screen active">
    <div class="search-wrap">
      <div class="search-box">
        <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.3-4.3"/></svg>
        <input type="text" id="home-search" placeholder="Search vendors, services…" oninput="onSearch()">
      </div>
      <div class="chip-row" id="home-chips">
        <button class="chip active" onclick="setTown(this,'All')">All Areas</button>
        <button class="chip" onclick="setTown(this,'Area 25')">Area 25</button>
        <button class="chip" onclick="setTown(this,'Blantyre CBD')">Blantyre CBD</button>
        <button class="chip" onclick="setTown(this,'Zomba')">Zomba</button>
        <button class="chip" onclick="setTown(this,'Mzuzu')">Mzuzu</button>
      </div>
    </div>

    <div class="desktop-home">
              <aside class="category-sidebar">

            <h2 class="section-title">Browse by category</h2>

            <div class="cat-grid" id="cat-grid"></div>

        </aside>

        <main>

            <h2 class="section-title">Vendors nearby</h2>

            <div class="vendor-list" id="home-list"></div>

        </main>
    </div>

  </div>

  <div id="screen-explore" class="screen">
    <div class="search-wrap">
      <div class="search-box">
        <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.3-4.3"/></svg>
        <input type="text" id="explore-search" placeholder="Search vendors, services…" oninput="onSearch()">
      </div>
      <div class="chip-row" id="explore-chips">
        <button class="chip active" onclick="setTown(this,'All')">All Areas</button>
        <button class="chip" onclick="setTown(this,'Area 25')">Area 25</button>
        <button class="chip" onclick="setTown(this,'Blantyre CBD')">Blantyre CBD</button>
        <button class="chip" onclick="setTown(this,'Zomba')">Zomba</button>
        <button class="chip" onclick="setTown(this,'Mzuzu')">Mzuzu</button>
      </div>
    </div>

<div class="desktop-explore">

    <div>

        <div class="section-title" id="explore-heading">
            All vendors
        </div>

        <div class="vendor-list" id="explore-list"></div>

    </div>

</div>

  </div>

  <div id="screen-profile" class="screen">
    <div id="profile-content"></div>
  </div>

  <div id="screen-add" class="screen">
    <h2 class="section-title" style="margin-top:6px;">Join Nsika</h2>
    <p class="small" style="margin-bottom:18px;">Create a free listing so customers can find and contact you.</p>
    <form class="form" onsubmit="submitVendor(event)">
      <div class="form-group">
        <label>Business / Your Name</label>
        <input type="text" name="name" required placeholder="e.g. Grace's Tailoring">
      </div>
      <div class="form-group">
        <label>Phone Number</label>
        <input type="tel" name="phone" required placeholder="e.g. +265 99 123 4567">
      </div>
      <div class="form-group">
        <label>WhatsApp Number (optional)</label>
        <input type="tel" name="whatsapp" placeholder="Same as phone if blank">
      </div>
      <div class="form-group">
        <label>Category</label>
        <select name="category" required id="signup-category"><option value="">Pick a category</option></select>
      </div>
      <div class="form-group">
        <label>Town / Area</label>
        <input type="text" name="town" required placeholder="e.g. Area 25, Lilongwe">
      </div>
      <div class="form-group">
        <label>Short Description</label>
        <textarea name="description" required placeholder="What do you offer?"></textarea>
      </div>
      <div class="form-group">
        <label>Photos (up to 3)</label>
        <div class="photo-slots" id="signup-photos">
          <div class="photo-slot"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg><input type="file" accept="image/*" onchange="handlePhoto(this,0)"></div>
          <div class="photo-slot"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg><input type="file" accept="image/*" onchange="handlePhoto(this,1)"></div>
          <div class="photo-slot"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg><input type="file" accept="image/*" onchange="handlePhoto(this,2)"></div>
        </div>
      </div>
      <button type="submit" class="btn btn-primary btn-full">Create Listing</button>
    </form>
  </div>

  <div id="screen-my" class="screen">
    <h2 class="section-title" style="margin-top:6px;">My Listings</h2>
    <div class="vendor-list" id="my-list"></div>
    <button class="btn btn-primary btn-full" style="margin-top:12px;" onclick="go('add')">+ Add New Listing</button>
  </div>

  <!-- Header -->
  <header class="topbar">
    <button class="icon-btn" id="header-back" onclick="back()" style="display:none;">
      <svg viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
    </button>
    <div class="title" id="header-title">Nsika</div>
    <button class="icon-btn" id="header-edit" onclick="headerAction()" style="display:none;">
      <svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.1 2.1 0 1 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
    </button>
    <button class="icon-btn" id="theme-toggle" onclick="toggleTheme()" aria-label="Toggle theme">
      <svg id="icon-moon" viewBox="0 0 24 24"><path d="M21 12.8A9 9 0 1 1 12.8 3 7 7 0 0 0 21 12.8z"/></svg>
      <svg id="icon-sun" viewBox="0 0 24 24" style="display:none"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.2 4.2l1.4 1.4M18.4 18.4l1.4 1.4M1 12h2M21 12h2M4.2 19.8l1.4-1.4M18.4 5.6l1.4-1.4"/></svg>
    </button>
  </header>

  <!-- Bottom Nav -->
  <nav class="bottom-nav">
    <button class="nav-item active" onclick="go('home')" id="nav-home">
      <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><path d="M9 22V12h6v10"/></svg>
      <span>Home</span>
    </button>
    <button class="nav-item" onclick="openExploreAll()" id="nav-explore">
      <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.3-4.3"/></svg>
      <span>Explore</span>
    </button>
    <button class="nav-item" onclick="go('add')" id="nav-add">
      <svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
      <span>Add</span>
    </button>
    <button class="nav-item" onclick="go('my')" id="nav-my">
      <svg viewBox="0 0 24 24"><path d="M3 21h18M5 21V10l7-4 7 4v11"/></svg>
      <span>My Shop</span>
    </button>
  </nav>

  <!-- Edit Sheet -->
  <div class="sheet-overlay" id="edit-overlay" onclick="closeEdit()"></div>
  <div class="sheet" id="edit-sheet">
    <div class="sheet-handle"></div>
    <h3>Edit Listing</h3>
    <p class="subtitle">Update your details so customers reach you.</p>
    <form class="form" onsubmit="saveEdit(event)">
      <input type="hidden" name="id" id="edit-id">
      <div class="form-group">
        <label>Name</label>
        <input type="text" name="name" id="edit-name" required>
      </div>
      <div class="form-group">
        <label>Phone</label>
        <input type="tel" name="phone" id="edit-phone" required>
      </div>
      <div class="form-group">
        <label>WhatsApp</label>
        <input type="tel" name="whatsapp" id="edit-whatsapp">
      </div>
      <div class="form-group">
        <label>Category</label>
        <select name="category" id="edit-category" required></select>
      </div>
      <div class="form-group">
        <label>Town / Area</label>
        <input type="text" name="town" id="edit-town" required>
      </div>
      <div class="form-group">
        <label>Description</label>
        <textarea name="description" id="edit-description" required></textarea>
      </div>
      <button type="submit" class="btn btn-primary btn-full">Save Changes</button>
      <button type="button" class="btn btn-outline btn-full" style="margin-top:8px; color:var(--danger); border-color:var(--border);" onclick="deleteListing()">Delete Listing</button>
    </form>
  </div>
</div>
<script type="module" src="js/supabase.js"></script>
<script type="module" src="script.js"></script>
</body>
</html>
